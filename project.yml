name: VoidXTodoMac
options:
  bundleIdPrefix: com.voidx.todo
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 3Y22R97HY4
targets:
  VoidXTodoMac:
    type: application
    platform: macOS
    sources:
      - path: Sources/VoidXTodoMac
      - path: Assets/AppIcon.icns
        buildPhase: resources
    dependencies:
      - target: VoidXTodoWidget
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.voidx.todo.mac
        INFOPLIST_KEY_CFBundleDisplayName: VoidX Todo
        INFOPLIST_KEY_CFBundleIconFile: AppIcon
        INFOPLIST_KEY_CFBundleURLTypes:
          - CFBundleURLName: VoidX Todo URL
            CFBundleURLSchemes:
              - voidxtodo
    info:
      path: Generated/VoidXTodoMac-Info.plist
      properties:
        CFBundleDisplayName: VoidX Todo
        CFBundleIconFile: AppIcon
        CFBundleURLTypes:
          - CFBundleURLName: VoidX Todo URL
            CFBundleURLSchemes:
              - voidxtodo
        LSMinimumSystemVersion: "14.0"
        NSPrincipalClass: NSApplication

  VoidXTodoWidget:
    type: app-extension
    platform: macOS
    sources:
      - path: Sources/VoidXTodoWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.voidx.todo.mac.widget
        INFOPLIST_KEY_CFBundleDisplayName: VoidX Today
    info:
      path: Generated/VoidXTodoWidget-Info.plist
      properties:
        CFBundleDisplayName: VoidX Today
        LSMinimumSystemVersion: "14.0"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
        UIDeviceFamily:
          - 2
